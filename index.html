<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">
<title>Aventura Familiar — Tareas y Hábitos</title>
<style>
:root{--fondo:#f6f7fb;--tarjeta:#fff;--texto:#172033;--suave:#667085;--primario:#4f46e5;--primario2:#7c3aed;--bien:#16a34a;--aviso:#f59e0b;--peligro:#dc2626;--linea:#e5e7eb;--sombra:0 12px 28px rgba(23,32,51,.09);--radio:20px}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#eef2ff 0,#f8fafc 30%,#f6f7fb 100%);color:var(--texto);min-height:100vh}
button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:1200px;margin:auto;padding:18px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.marca{display:flex;align-items:center;gap:12px;font-weight:900;font-size:1.2rem}.marca-icono{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primario),var(--primario2));color:#fff;box-shadow:var(--sombra)}
.herramientas{display:flex;gap:8px;flex-wrap:wrap}.boton{border:0;border-radius:14px;padding:11px 15px;font-weight:800;background:#eef2ff;color:#3730a3;min-height:44px}.boton:hover{filter:brightness(.98)}.boton.primario{background:linear-gradient(135deg,var(--primario),var(--primario2));color:white}.boton.bien{background:#dcfce7;color:#166534}.boton.aviso{background:#fef3c7;color:#92400e}.boton.peligro{background:#fee2e2;color:#991b1b}.boton.neutro{background:white;border:1px solid var(--linea);color:var(--texto)}.boton.peq{padding:8px 10px;min-height:36px;border-radius:10px;font-size:.9rem}
.tarjeta{background:var(--tarjeta);border:1px solid rgba(229,231,235,.9);border-radius:var(--radio);padding:18px;box-shadow:var(--sombra)}.rejilla{display:grid;gap:16px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}
.hero{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}.hero-principal{padding:28px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:28px;box-shadow:var(--sombra)}.hero-principal h1{font-size:clamp(2rem,5vw,4rem);margin:0 0 10px;line-height:1}.hero-principal p{font-size:1.1rem;opacity:.92}.hero-lado{display:grid;gap:16px}
h1,h2,h3{margin-top:0}.suave{color:var(--suave)}.oculto{display:none!important}.avatar{width:68px;height:68px;border-radius:20px;display:grid;place-items:center;font-size:2rem;background:#eef2ff}
.selector-ninos{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}.nino-card{border:2px solid transparent;text-align:center;background:white;border-radius:20px;padding:18px;box-shadow:var(--sombra);transition:.18s}.nino-card:hover{transform:translateY(-2px);border-color:#c7d2fe}.nino-card .avatar{margin:0 auto 10px}
.metrica{padding:16px;border-radius:16px;background:#eef2ff;border:1px solid #c7d2fe;color:#1e1b4b}.metrica span{color:#312e81;font-weight:800}.metrica strong{font-size:1.7rem;display:block;color:#111827}.panel-nino{color:#111827}.panel-nino h3,.panel-nino div{color:#111827}.panel-nino .etiqueta{color:#312e81}.biblioteca-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.biblioteca-item{background:#f8fafc;border-radius:16px;padding:16px}.biblioteca-item h3{margin-bottom:6px}.biblioteca-datos{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.selector-dias{display:grid;grid-template-columns:repeat(7,minmax(48px,1fr));gap:7px;grid-column:1/-1}.dia-check{display:flex;align-items:center;justify-content:center;gap:5px;background:#f8fafc;border:1px solid #d0d5dd;border-radius:10px;padding:9px 5px;font-weight:700}.dia-check input{width:auto;margin:0}.matriz-wrap{overflow:auto}.matriz-hogar{border-collapse:separate;border-spacing:6px;width:100%}.matriz-hogar th,.matriz-hogar td{border:0;border-radius:10px;padding:10px;background:#f8fafc;color:#111827}.matriz-hogar th{background:#e0e7ff;color:#312e81}.matriz-hogar td.asignada{background:#dcfce7;color:#14532d;font-weight:800}.progreso{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}.progreso>span{display:block;height:100%;background:linear-gradient(90deg,var(--primario),#8b5cf6);border-radius:inherit}
.anillo{--p:0;width:150px;height:150px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--primario) calc(var(--p)*1%),#e5e7eb 0);position:relative}.anillo:before{content:"";position:absolute;inset:14px;background:white;border-radius:50%}.anillo strong{position:relative;font-size:2rem}
.lista{display:grid;gap:10px}.tarea{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--linea);border-radius:16px;background:white}.tarea.hecha{background:#f0fdf4;border-color:#bbf7d0}.tarea.pendiente{background:#fffbeb;border-color:#fde68a}.tarea-icono{font-size:1.8rem;width:44px;text-align:center}.tarea-main{flex:1;min-width:0}.tarea-main strong{display:block}.meta{font-size:.85rem;color:var(--suave)}
.etiqueta{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:800;font-size:.85rem}.premio{display:flex;gap:12px;align-items:center;padding:16px;border-radius:18px;background:linear-gradient(135deg,#fff7ed,#fffbeb);border:1px solid #fed7aa}.premio-icono{font-size:2.5rem}
.nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.nav button.activo{background:var(--primario);color:white}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}label{font-weight:700;font-size:.9rem}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:12px;padding:11px 12px;background:white}.campo{display:grid;gap:6px}
.modal-fondo{position:fixed;inset:0;background:rgba(15,23,42,.62);display:grid;place-items:center;padding:16px;z-index:30}.modal{background:white;border-radius:24px;padding:20px;width:min(620px,100%);max-height:90vh;overflow:auto;box-shadow:0 28px 70px rgba(0,0,0,.25)}.modal-acciones{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap}
.tabla{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:11px;border-bottom:1px solid var(--linea);vertical-align:top}th{font-size:.82rem;color:var(--suave);text-transform:uppercase}
.semana{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dia{background:#f8fafc;border:1px solid var(--linea);border-radius:14px;padding:10px;text-align:center;min-height:85px}.jardin{min-height:170px;border-radius:20px;background:linear-gradient(#dbeafe 0 55%,#dcfce7 55%);padding:18px;display:flex;align-items:end;gap:8px}.planta{font-size:2rem}.camino{display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:18px;padding:16px;position:relative}.camino:before{content:"";position:absolute;left:7%;right:7%;top:50%;height:6px;background:#dbeafe}.parada{position:relative;z-index:1;background:white;border:3px solid #c7d2fe;border-radius:50%;width:56px;height:56px;display:grid;place-items:center;font-size:1.6rem}.parada.activa{border-color:var(--primario);transform:scale(1.08)}
.toast{position:fixed;right:20px;bottom:20px;background:#111827;color:white;padding:13px 16px;border-radius:14px;box-shadow:var(--sombra);z-index:60}.confeti{position:fixed;inset:0;pointer-events:none;z-index:55;overflow:hidden}.confeti span{position:absolute;top:-20px;animation:caer 1.6s linear forwards}@keyframes caer{to{transform:translateY(110vh) rotate(600deg)}}
@media(max-width:850px){.hero,.cols4,.cols3,.cols2,.form-grid{grid-template-columns:1fr}.semana{grid-template-columns:repeat(4,1fr)}.selector-dias{grid-template-columns:repeat(4,1fr)}}@media(max-width:520px){.app{padding:10px}.semana{grid-template-columns:repeat(2,1fr)}.hero-principal{padding:22px}.tarea{align-items:flex-start}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}@media print{body{background:white}.topbar,.nav,.no-print{display:none!important}.tarjeta{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<div class="app"><header class="topbar"><div class="marca"><div class="marca-icono">🏡</div><div>Aventura Familiar</div></div><div class="herramientas" id="barra"></div></header><main id="app"></main></div>
<div id="modalRoot"></div><div id="toastRoot"></div>
<script>
(()=>{
'use strict';
const CLAVE='aventuraFamiliar.v1',DIAS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'],ZONA='America/Chicago',RETENCION_DIAS=365;
const CATS={personal:{nombre:'Personal',icono:'🧼'},hogar:{nombre:'Home',icono:'🏠'},fortaleza:{nombre:'Strength',icono:'💪'}};
const PREMIOS=[
{min:100,nombre:'Campeón Diamante',icono:'💎',mensaje:'¡Esfuerzo perfecto hoy!'},
{min:90,nombre:'Estrella de Oro',icono:'🌟',mensaje:'¡Trabajo increíble!'},
{min:80,nombre:'Estrella de Plata',icono:'⭐',mensaje:'¡Firme y constante!'},
{min:70,nombre:'Estrella de Bronce',icono:'🥉',mensaje:'¡Excelente progreso!'},
{min:50,nombre:'Ayudante en Crecimiento',icono:'🌱',mensaje:'¡Estás creciendo!'},
{min:0,nombre:'Sigue Creciendo',icono:'💪',mensaje:'¡Cada paso cuenta!'}];
const BIBLIOTECA=[
['Ordenar la sala','hogar','🛋️',1,'fácil'],['Recoger los juguetes','hogar','🧸',1,'fácil'],['Barrer el piso','hogar','🧹',2,'media'],['Recoger la mesa','hogar','🍽️',1,'fácil'],['Limpiar la mesa','hogar','🧽',2,'media'],['Poner los platos en el lavaplatos','hogar','🍽️',2,'media'],['Vaciar el lavaplatos','hogar','🫧',2,'media'],['Sacar la basura','hogar','🗑️',3,'difícil'],['Guardar los zapatos','hogar','👟',1,'fácil'],['Doblar las toallas','hogar','🧺',2,'media'],
['Cepillarse los dientes por la mañana','personal','🪥',1,'fácil'],['Cepillarse los dientes antes de dormir','personal','🪥',1,'fácil'],['Bañarse o ducharse','personal','🚿',2,'media'],['Preparar la ropa para mañana','personal','👕',1,'fácil'],['Tender la cama','personal','🛏️',1,'fácil'],['Preparar la mochila escolar','personal','🎒',1,'fácil'],
['Hacer ejercicio o jugar activamente','fortaleza','🏃',2,'media'],['Leer durante 20 minutos','fortaleza','📚',2,'media'],['Oración diaria','fortaleza','🙏',1,'fácil'],['Leer las Escrituras','fortaleza','📖',1,'fácil'],['Compartir algo por lo que estás agradecido','fortaleza','💛',1,'fácil'],['Ayudar a un familiar','fortaleza','🤝',2,'media']];
let estado=cargar();
if(!Array.isArray(estado.premios)||!estado.premios.length)estado.premios=PREMIOS.map(p=>({...p,id:id()}));
estado.premios=estado.premios.map(p=>({...p,id:p.id||id()}));guardar();
let sesion={rol:null,ninoId:null,vista:'inicio'},temporizador=null;
function id(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fechaCentral(fecha=new Date()){const p=new Intl.DateTimeFormat('en-CA',{timeZone:ZONA,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(fecha),v=Object.fromEntries(p.map(x=>[x.type,x.value]));return`${v.year}-${v.month}-${v.day}`}
function hoy(){return fechaCentral()}
function fechaUTC(f){return new Date(f+'T12:00:00Z')}
function inicioSemana(fecha=hoy()){const f=typeof fecha==='string'?fecha:fechaCentral(fecha),d=fechaUTC(f),ini=estado.ajustes.iniciaSemana==='lunes'?1:0,dif=(d.getUTCDay()-ini+7)%7;d.setUTCDate(d.getUTCDate()-dif);return d.toISOString().slice(0,10)}
function sumarFecha(f,n){const d=fechaUTC(f);d.setUTCDate(d.getUTCDate()+n);return d.toISOString().slice(0,10)}
function fechaHoraCentral(x=new Date()){return new Intl.DateTimeFormat('es-US',{timeZone:ZONA,dateStyle:'medium',timeStyle:'short'}).format(new Date(x))}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function controlesDias(prefijo,seleccionados=[]){return`<div class="selector-dias"><label style="grid-column:1/-1">Días requeridos</label>${DIAS.map((d,i)=>`<label class="dia-check"><input type="checkbox" id="${prefijo}${i}" ${seleccionados.includes(i)?'checked':''}> ${d}</label>`).join('')}</div>`}
function leerDias(prefijo){return DIAS.map((_,i)=>i).filter(i=>document.getElementById(prefijo+i)?.checked)}
async function hash(t){const b=new TextEncoder().encode(t),r=await crypto.subtle.digest('SHA-256',b);return [...new Uint8Array(r)].map(x=>x.toString(16).padStart(2,'0')).join('')}
function valor(cat){return cat==='hogar'?'Trabajo en equipo':cat==='personal'?'Responsabilidad':'Fortaleza y crecimiento'}
function base(){return{version:3,ajustes:{nombreFamilia:'Nuestra Familia',iniciaSemana:'domingo',animaciones:true,mostrarPuntos:true,parentHash:''},ninos:[],responsabilidades:BIBLIOTECA.map(([nombre,categoria,icono,peso,dificultad])=>({id:id(),nombre,categoria,icono,peso,dificultad,activo:true,verificacion:false,valor:valor(categoria),diasPredeterminados:categoria==='hogar'?[1,3,5]:[0,1,2,3,4,5,6]})),asignaciones:[],plantillaInicial:[],registros:{},premios:PREMIOS.map(p=>({...p,id:id()})),anulaciones:[],recompensas:[{id:id(),nombre:'Elegir la película familiar',costo:40,icono:'🎬'},{id:id(),nombre:'Elegir el postre',costo:30,icono:'🍨'},{id:id(),nombre:'Dormir 15 minutos más tarde',costo:50,icono:'🌙'}],canjes:[],metaFamiliar:{objetivo:90,recompensa:'Noche de película familiar'}}}
function cargar(){try{const x=JSON.parse(localStorage.getItem(CLAVE))||base();x.plantillaInicial=x.plantillaInicial||[];x.anulaciones=x.anulaciones||[];x.responsabilidades=(x.responsabilidades||[]).map(r=>({...r,categoria:['practica','salud'].includes(r.categoria)?'fortaleza':r.categoria,diasPredeterminados:Array.isArray(r.diasPredeterminados)?r.diasPredeterminados:(r.categoria==='hogar'?[1,3,5]:[0,1,2,3,4,5,6])}));x.version=4;return x}catch{return base()}}function depurarHistorial(){const corte=sumarFecha(hoy(),-RETENCION_DIAS);Object.keys(estado.registros).forEach(k=>{const f=k.split('|')[1];if(f&&f<corte)delete estado.registros[k]});estado.anulaciones=(estado.anulaciones||[]).filter(a=>(a.fechaActividad||fechaCentral(new Date(a.fecha)))>=corte);estado.asignaciones=(estado.asignaciones||[]).filter(a=>a.inicioSemana>=sumarFecha(corte,-7))}function guardar(){depurarHistorial();localStorage.setItem(CLAVE,JSON.stringify(estado))}
function cambiarSesion(rol,ninoId=null){sesion={rol,ninoId,vista:rol==='padre'?'panel-padre':rol==='nino'?'hoy-nino':'inicio'};renderizar();reiniciarBloqueo()}
function reiniciarBloqueo(){clearTimeout(temporizador);if(sesion.rol==='padre')temporizador=setTimeout(()=>{aviso('El modo de padres se bloqueó por inactividad');cambiarSesion(null)},10*60*1000)}
['click','keydown','touchstart'].forEach(e=>document.addEventListener(e,()=>sesion.rol==='padre'&&reiniciarBloqueo(),{passive:true}));
function claveRegistro(n,f,a){return`${n}|${f}|${a}`}function estadoTarea(n,f,a){return estado.registros[claveRegistro(n,f,a)]||{estado:'incompleta'}}function ponerEstado(n,f,a,est){estado.registros[claveRegistro(n,f,a)]={estado:est,actualizado:new Date().toISOString()};guardar()}
function tareasActivas(n,f){const dia=fechaUTC(f).getUTCDay();return estado.asignaciones.filter(a=>a.ninoId===n&&a.inicioSemana===inicioSemana(f)&&(a.dias||[]).includes(dia)).map(a=>({...a,resp:estado.responsabilidades.find(r=>r.id===a.responsabilidadId)})).filter(x=>x.resp)}
function porcentaje(n,f){let den=0,num=0;tareasActivas(n,f).forEach(a=>{const s=estadoTarea(n,f,a.id).estado,w=a.peso||a.resp.peso||1;if(['justificada','no_aplica'].includes(s))return;den+=w;if(['completa','aprobada'].includes(s))num+=w});return den?Math.round(num/den*100):0}
function porcentajeSemanal(n,ini=inicioSemana()){let den=0,num=0;for(let i=0;i<7;i++){const f=sumarFecha(ini,i);tareasActivas(n,f).forEach(a=>{const s=estadoTarea(n,f,a.id).estado,w=a.peso||a.resp.peso||1;if(['justificada','no_aplica'].includes(s))return;den+=w;if(['completa','aprobada'].includes(s))num+=w})}return den?Math.round(num/den*100):0}
function premio(p){return [...estado.premios].sort((a,b)=>b.min-a.min).find(a=>p>=a.min)||{nombre:'Sin premio',icono:'✨',mensaje:'Sigue avanzando',min:0}}
function puntos(n){let p=0;Object.entries(estado.registros).forEach(([k,v])=>{if(k.startsWith(n+'|')&&['completa','aprobada'].includes(v.estado)){const aid=k.split('|')[2],a=estado.asignaciones.find(x=>x.id===aid);p+=a?.peso||1}});return p-estado.canjes.filter(c=>c.ninoId===n).reduce((s,c)=>s+c.costo,0)}
function aviso(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.getElementById('toastRoot').appendChild(e);setTimeout(()=>e.remove(),2400)}
function celebrar(){if(!estado.ajustes.animaciones)return;const c=document.createElement('div');c.className='confeti';for(let i=0;i<28;i++){const s=document.createElement('span');s.textContent=['⭐','🎉','✨','💎'][i%4];s.style.left=Math.random()*100+'%';s.style.animationDelay=Math.random()*.5+'s';c.appendChild(s)}document.body.appendChild(c);setTimeout(()=>c.remove(),2200)}
function modal(t,c,a=''){document.getElementById('modalRoot').innerHTML=`<div class="modal-fondo" onclick="if(event.target===this)cerrarModal()"><div class="modal"><h2>${t}</h2>${c}<div class="modal-acciones">${a||'<button class="boton neutro" onclick="cerrarModal()">Cerrar</button>'}</div></div></div>`}
window.cerrarModal=()=>document.getElementById('modalRoot').innerHTML='';
function renderizar(){document.getElementById('barra').innerHTML=sesion.rol?`<span class="etiqueta">${sesion.rol==='padre'?'🔐 Modo de padres':'👤 Modo infantil'}</span><button class="boton neutro peq" onclick="salir()">Bloquear / Salir</button>`:'';if(!estado.ajustes.parentHash)return configuracion();if(!sesion.rol)return inicio();if(sesion.rol==='nino')vistaNino();else vistaPadre()}
function configuracion(){document.getElementById('app').innerHTML=`<section class="hero"><div class="hero-principal"><h1>Formemos hábitos. Crezcamos juntos.</h1><p>Configura un sistema familiar privado de tareas, responsabilidades y hábitos diarios.</p></div><div class="tarjeta"><h2>Configuración de padres</h2><div class="campo"><label>Nombre de la familia</label><input id="fam" value="Nuestra Familia"></div><br><div class="campo"><label>Contraseña maestra</label><input id="pass" type="password"></div><br><div class="campo"><label>Confirmar contraseña</label><input id="pass2" type="password"></div><br><button class="boton primario" onclick="completar()">Crear aplicación familiar</button> <button class="boton neutro" onclick="demo()">Cargar familia de demostración</button></div></section>`}
window.completar=async()=>{const p=pass.value,p2=pass2.value;if(p.length<4||p!==p2)return aviso('Las contraseñas deben coincidir y tener al menos 4 caracteres.');estado.ajustes.nombreFamilia=fam.value.trim()||'Nuestra Familia';estado.ajustes.parentHash=await hash(p);guardar();aviso('Aplicación familiar creada');renderizar()}
window.demo=async()=>{estado=base();estado.ajustes.nombreFamilia='La Familia Aventurera';estado.ajustes.parentHash=await hash('2468');for(const [nombre,edad,avatar,pin] of [['Alex',10,'🧑‍🚀','111'],['Dani',8,'⚽','222'],['Rafa',6,'🦄','333'],['Cami',5,'🦖','444'],['Tati',4,'🐻','555']])estado.ninos.push({id:id(),nombre,edad,avatar,pinHash:await hash(pin),activo:true,modoPequeno:edad<=5});crearPlan();guardar();aviso('Demostración: contraseña de padres 2468');renderizar()}

function htmlTarea(n,a){const s=estadoTarea(n.id,hoy(),a.id).estado,hecha=['completa','aprobada'].includes(s),pend=s==='pendiente',txt=hecha?'Completada':pend?'Esperando a un padre':a.resp.verificacion?'Lista para revisar':'Marcar completa';return`<div class="tarea ${hecha?'hecha':''} ${pend?'pendiente':''}"><div class="tarea-icono">${a.resp.icono}</div><div class="tarea-main"><strong>${esc(a.resp.nombre)}</strong><div class="meta">${CATS[a.resp.categoria].nombre} • ${a.peso||a.resp.peso} punto(s) • ${a.resp.valor}</div></div><button class="boton ${hecha?'bien':pend?'aviso':'primario'}" onclick="alternar('${a.id}')">${txt}</button>${n.modoPequeno?`<button class="boton neutro peq" onclick="hablar('${esc(a.resp.nombre)}')">🔊</button>`:''}</div>`}

function matrizHogarSemanal(){const ini=inicioSemana(),ns=estado.ninos.filter(n=>n.activo),asigs=estado.asignaciones.filter(a=>a.inicioSemana===ini&&estado.responsabilidades.find(r=>r.id===a.responsabilidadId)?.categoria==='hogar');const tareas=[...new Set(asigs.map(a=>a.responsabilidadId))].map(rid=>estado.responsabilidades.find(r=>r.id===rid)).filter(Boolean);if(!tareas.length)return'<p class="suave">No hay actividades del Hogar asignadas para esta semana.</p>';return`<div class="matriz-wrap"><table class="matriz-hogar"><thead><tr><th>Actividad del Hogar</th>${ns.map(n=>`<th>${n.avatar} ${esc(n.nombre)}</th>`).join('')}</tr></thead><tbody>${tareas.map(r=>`<tr><th>${r.icono} ${esc(r.nombre)}</th>${ns.map(n=>{const a=asigs.find(x=>x.responsabilidadId===r.id&&x.ninoId===n.id);return`<td class="${a?'asignada':''}">${a?(a.dias||[]).map(d=>DIAS[d]).join(', '):'—'}</td>`}).join('')}</tr>`).join('')}</tbody></table></div>`}
function matrizResponsabilidades(){const ns=estado.ninos.filter(n=>n.activo),fecha=hoy(),porResp=new Map();ns.forEach(n=>tareasActivas(n.id,fecha).forEach(a=>porResp.set(a.responsabilidadId,a.resp)));const rs=[...porResp.values()];if(!rs.length)return'<p class="suave">No hay responsabilidades comunes programadas para hoy.</p>';return`<div class="matriz-wrap"><table class="matriz-hogar"><thead><tr><th>Responsabilidad</th>${ns.map(n=>`<th>${n.avatar} ${esc(n.nombre)}</th>`).join('')}</tr></thead><tbody>${rs.map(r=>`<tr><th>${r.icono} ${esc(r.nombre)}<div class="meta">${CATS[r.categoria]?.nombre||r.categoria}</div></th>${ns.map(n=>{const a=tareasActivas(n.id,fecha).find(x=>x.responsabilidadId===r.id);if(!a)return'<td>—</td>';const s=estadoTarea(n.id,fecha,a.id).estado,p=['completa','aprobada'].includes(s);return`<td class="${p?'asignada':''}">${p?'✓ Completa':s==='pendiente'?'⏳ Pendiente':'○ Incompleta'}</td>`}).join('')}</tr>`).join('')}</tbody></table></div>`}
function panelPadre(){const ns=estado.ninos.filter(n=>n.activo),prom=ns.length?Math.round(ns.reduce((s,n)=>s+porcentaje(n.id,hoy()),0)/ns.length):0;document.getElementById('app').innerHTML=`${navPadre()}<section class="rejilla cols4"><div class="metrica"><span>Familia hoy</span><strong>${prom}%</strong><small>${fechaHoraCentral()}</small></div><div class="metrica"><span>Aprobaciones pendientes</span><strong>${pendientes().length}</strong></div><div class="metrica"><span>Semana actual</span><strong>${inicioSemana()}</strong></div><div class="metrica"><span>Recompensa familiar</span><strong>${prom>=estado.metaFamiliar.objetivo?'¡Desbloqueada!':'En progreso'}</strong></div></section><section class="rejilla cols3" style="margin-top:16px">${ns.map(n=>{const p=porcentaje(n.id,hoy()),s=porcentajeSemanal(n.id),pr=premio(p);return`<div class="tarjeta panel-nino"><div style="display:flex;gap:12px;align-items:center"><div class="avatar">${n.avatar}</div><div><h3>${esc(n.nombre)}</h3><span class="etiqueta">${pr.icono} ${pr.nombre}</span></div></div><br><div><strong>Hoy: ${p}%</strong></div><div class="progreso"><span style="width:${p}%"></span></div><br><div><strong>Esta semana: ${s}%</strong></div><div class="progreso"><span style="width:${s}%"></span></div></div>`}).join('')}</section><section class="tarjeta" style="margin-top:16px"><h2>Matriz de responsabilidades comunes — hoy</h2><p class="suave">Vista comparativa de cada niño y el estado de sus responsabilidades programadas.</p>${matrizResponsabilidades()}</section><section class="tarjeta" style="margin-top:16px"><h2>Matriz semanal de actividades del Hogar</h2><p style="color:#334155;font-weight:700">Cada actividad aparece como una asignación semanal por participante; los días indican cuándo debe realizarse.</p>${matrizHogarSemanal()}</section>`}

window.agregarNino=()=>{if(estado.ninos.length>=5)return aviso('Se permite un máximo de cinco niños.');modal('Agregar niño',`<div class="form-grid"><div class="campo"><label>Nombre</label><input id="nNombre"></div><div class="campo"><label>Edad</label><input id="nEdad" type="number" min="3" max="18" value="7"></div><div class="campo"><label>Avatar</label><input id="nAvatar" value="⭐"></div><div class="campo"><label>PIN de 3 dígitos</label><input id="nPin" type="password" maxlength="3" inputmode="numeric"></div></div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarNino()">Guardar</button>`)}

function crearPlan(){const ini=inicioSemana();estado.asignaciones=estado.asignaciones.filter(a=>a.inicioSemana!==ini);if(estado.plantillaInicial.length){estado.plantillaInicial.forEach(t=>{if(estado.ninos.some(n=>n.id===t.ninoId&&n.activo)&&estado.responsabilidades.some(r=>r.id===t.responsabilidadId&&r.activo))estado.asignaciones.push({...t,id:id(),inicioSemana:ini,dias:[...(t.dias||[])]})});guardar();return}const ns=estado.ninos.filter(n=>n.activo),hogar=estado.responsabilidades.filter(r=>r.categoria==='hogar'&&r.activo);ns.forEach((n,i)=>{estado.responsabilidades.filter(r=>r.categoria!=='hogar'&&r.activo).slice(0,n.edad<=5?4:n.edad<=7?6:8).forEach(r=>estado.asignaciones.push({id:id(),inicioSemana:ini,ninoId:n.id,responsabilidadId:r.id,dias:[...(r.diasPredeterminados||[0,1,2,3,4,5,6])],peso:r.peso}));if(hogar.length)[hogar[i%hogar.length],hogar[(i+5)%hogar.length]].forEach(r=>estado.asignaciones.push({id:id(),inicioSemana:ini,ninoId:n.id,responsabilidadId:r.id,dias:[...(r.diasPredeterminados||[1,3,5])],peso:r.peso}))});guardar()}

window.editarAsignacion=aid=>{const a=estado.asignaciones.find(x=>x.id===aid),r=estado.responsabilidades.find(x=>x.id===a.responsabilidadId);modal('Editar asignación',`<div class="form-grid"><div class="campo"><label>Niño</label><select id="eaNino">${estado.ninos.filter(n=>n.activo).map(n=>`<option value="${n.id}" ${n.id===a.ninoId?'selected':''}>${esc(n.nombre)}</option>`).join('')}</select></div><div class="campo"><label>Responsabilidad</label><select id="eaResp">${estado.responsabilidades.filter(x=>x.activo).map(x=>`<option value="${x.id}" ${x.id===a.responsabilidadId?'selected':''}>${x.icono} ${esc(x.nombre)}</option>`).join('')}</select></div><div class="campo"><label>Días requeridos</label><input id="eaDias" value="${(a.dias||[]).join(',')}"><small>0=Domingo hasta 6=Sábado</small></div><div class="campo"><label>Puntos</label><input id="eaPeso" type="number" min="1" max="10" value="${a.peso||r?.peso||1}"></div></div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarEdicionAsignacion('${aid}')">Guardar</button>`)}
window.guardarEdicionAsignacion=aid=>{const a=estado.asignaciones.find(x=>x.id===aid);a.ninoId=eaNino.value;a.responsabilidadId=eaResp.value;a.dias=eaDias.value.split(',').map(Number).filter(x=>x>=0&&x<=6);a.peso=+eaPeso.value||1;guardar();cerrarModal();aviso('Asignación actualizada');renderizar()}
window.rotar=()=>{const ns=estado.ninos.filter(n=>n.activo),ini=inicioSemana();estado.asignaciones.filter(a=>a.inicioSemana===ini&&estado.responsabilidades.find(r=>r.id===a.responsabilidadId)?.categoria==='hogar').forEach(a=>{const i=ns.findIndex(n=>n.id===a.ninoId);a.ninoId=ns[(i+1)%ns.length].id});guardar();aviso('Tareas del hogar rotadas');renderizar()}
function asignacionesPadre(){const ini=inicioSemana();document.getElementById('app').innerHTML=`${navPadre()}<section class="tarjeta"><div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap"><div><h2>Asignaciones semanales</h2><p class="suave">Semana del ${ini} • Plantilla guardada: ${estado.plantillaInicial.length?'Sí':'No'}</p></div><div><button class="boton bien" onclick="crearPlan()">Aplicar plan inicial</button> <button class="boton bien" onclick="guardarPlantillaInicial()">Guardar como plan inicial</button> <button class="boton aviso" onclick="rotar()">Rotar tareas del hogar</button> <button class="boton primario" onclick="agregarAsignacion()">Agregar asignación</button></div></div><div class="tabla"><table><thead><tr><th>Niño</th><th>Responsabilidad</th><th>Categoría</th><th>Días</th><th>Puntos</th><th></th></tr></thead><tbody>${estado.asignaciones.filter(a=>a.inicioSemana===ini).map(a=>{const n=estado.ninos.find(x=>x.id===a.ninoId),r=estado.responsabilidades.find(x=>x.id===a.responsabilidadId);return`<tr><td>${n?.avatar||''} ${esc(n?.nombre||'')}</td><td>${r?.icono||''} ${esc(r?.nombre||'')}</td><td>${r?CATS[r.categoria].nombre:''}</td><td>${(a.dias||[]).map(d=>DIAS[d]).join(', ')}</td><td>${a.peso||r?.peso||1}</td><td><button class="boton neutro peq" onclick="editarAsignacion('${a.id}')">Editar</button> <button class="boton peligro peq" onclick="borrarAsignacion('${a.id}')">Eliminar</button></td></tr>`}).join('')}</tbody></table></div></section>`}
window.agregarAsignacion=()=>modal('Agregar asignación semanal',`<div class="form-grid"><div class="campo"><label>Niño</label><select id="aNino">${estado.ninos.filter(n=>n.activo).map(n=>`<option value="${n.id}">${esc(n.nombre)}</option>`).join('')}</select></div><div class="campo"><label>Responsabilidad</label><select id="aResp">${estado.responsabilidades.filter(r=>r.activo).map(r=>`<option value="${r.id}">${r.icono} ${esc(r.nombre)}</option>`).join('')}</select></div><div class="campo"><label>Días</label><input id="aDias" value="0,1,2,3,4,5,6"><button type="button" class="boton neutro peq" onclick="usarFrecuenciaBiblioteca()">Usar frecuencia de la biblioteca</button><small>0=Domingo hasta 6=Sábado</small></div><div class="campo"><label>Puntos</label><input id="aPeso" type="number" min="1" max="10" value="1"></div></div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarAsignacion()">Agregar</button>`)
window.usarFrecuenciaBiblioteca=()=>{const r=estado.responsabilidades.find(x=>x.id===aResp.value);aDias.value=(r?.diasPredeterminados||[]).join(',')}
window.guardarAsignacion=()=>{estado.asignaciones.push({id:id(),inicioSemana:inicioSemana(),ninoId:aNino.value,responsabilidadId:aResp.value,dias:aDias.value.split(',').map(Number).filter(x=>x>=0&&x<=6),peso:+aPeso.value||1});guardar();cerrarModal();renderizar()}
window.borrarAsignacion=aid=>{if(confirm('¿Eliminar esta asignación?')){estado.asignaciones=estado.asignaciones.filter(a=>a.id!==aid);guardar();renderizar()}}
function bibliotecaPadre(){document.getElementById('app').innerHTML=`${navPadre()}<section class="tarjeta"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><h2>Biblioteca de responsabilidades</h2><p style="color:#334155;font-weight:600">Edita cada elemento y selecciona sus días mediante casillas independientes.</p></div><button class="boton primario" onclick="nuevaResponsabilidad()">Agregar personalizada</button></div><div class="biblioteca-grid">${estado.responsabilidades.map(r=>`<article class="biblioteca-item"><h3>${r.icono} ${esc(r.nombre)}</h3><div class="biblioteca-datos"><span class="etiqueta">${CATS[r.categoria].nombre}</span><span class="etiqueta">${r.dificultad}</span><span class="etiqueta">${r.peso||1} punto(s)</span></div><div><strong>Días:</strong> ${(r.diasPredeterminados||[]).map(d=>DIAS[d]).join(', ')||'Sin días'}</div><div style="margin-top:12px"><button class="boton peq neutro" onclick="editarResponsabilidad('${r.id}')">Editar</button> <button class="boton peq ${r.verificacion?'aviso':'neutro'}" onclick="verificacion('${r.id}')">${r.verificacion?'Verificación requerida':'Sin verificación'}</button></div></article>`).join('')}</div></section>`}
window.verificacion=rid=>{const r=estado.responsabilidades.find(x=>x.id===rid);r.verificacion=!r.verificacion;guardar();renderizar()}
window.nuevaResponsabilidad=()=>modal('Agregar responsabilidad',`<div class="form-grid"><div class="campo"><label>Nombre</label><input id="rNombre"></div><div class="campo"><label>Categoría</label><select id="rCat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v.nombre}</option>`).join('')}</select></div><div class="campo"><label>Emoji</label><input id="rIcono" value="✅"></div><div class="campo"><label>Dificultad</label><select id="rDif"><option>fácil</option><option>media</option><option>difícil</option></select></div><div class="campo"><label>Puntos</label><input id="rPeso" type="number" min="1" max="10" value="1"></div>${controlesDias('rDia',[0,1,2,3,4,5,6])}</div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarResponsabilidad()">Guardar</button>`)
window.guardarResponsabilidad=()=>{const cat=rCat.value;estado.responsabilidades.push({id:id(),nombre:rNombre.value.trim(),categoria:cat,icono:rIcono.value||'✅',peso:+rPeso.value||1,dificultad:rDif.value,activo:true,verificacion:false,valor:valor(cat),diasPredeterminados:leerDias('rDia')});guardar();cerrarModal();renderizar()}
window.editarResponsabilidad=rid=>{const r=estado.responsabilidades.find(x=>x.id===rid);modal('Editar responsabilidad',`<div class="form-grid"><div class="campo"><label>Nombre</label><input id="erNombre" value="${esc(r.nombre)}"></div><div class="campo"><label>Categoría</label><select id="erCat">${Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${k===r.categoria?'selected':''}>${v.nombre}</option>`).join('')}</select></div><div class="campo"><label>Emoji</label><input id="erIcono" value="${r.icono}"></div><div class="campo"><label>Dificultad</label><select id="erDif"><option ${r.dificultad==='fácil'?'selected':''}>fácil</option><option ${r.dificultad==='media'?'selected':''}>media</option><option ${r.dificultad==='difícil'?'selected':''}>difícil</option></select></div><div class="campo"><label>Puntos</label><input id="erPeso" type="number" min="1" max="10" value="${r.peso||1}"></div><div class="campo"><label>Estado</label><select id="erActivo"><option value="true" ${r.activo?'selected':''}>Activa</option><option value="false" ${!r.activo?'selected':''}>Inactiva</option></select></div>${controlesDias('erDia',r.diasPredeterminados||[])}</div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarEdicionResponsabilidad('${rid}')">Guardar cambios</button>`)}
window.guardarEdicionResponsabilidad=rid=>{const r=estado.responsabilidades.find(x=>x.id===rid),cat=erCat.value;r.nombre=erNombre.value.trim();r.categoria=cat;r.icono=erIcono.value||'✅';r.dificultad=erDif.value;r.peso=+erPeso.value||1;r.diasPredeterminados=leerDias('erDia');r.activo=erActivo.value==='true';r.valor=valor(cat);guardar();cerrarModal();aviso('Responsabilidad actualizada');renderizar()}
function correccionesPadre(){const ns=estado.ninos.filter(n=>n.activo),nid=sesion.correccionNino||ns[0]?.id,fecha=sesion.correccionFecha||hoy();sesion.correccionNino=nid;sesion.correccionFecha=fecha;const min=sumarFecha(hoy(),-RETENCION_DIAS),ts=nid?tareasActivas(nid,fecha):[];document.getElementById('app').innerHTML=`${navPadre()}<section class="tarjeta"><h2>Corregir actividades</h2><p class="suave">El padre puede corregir cualquier actividad programada dentro del historial de un año. Cada cambio queda registrado.</p><div class="form-grid no-print"><div class="campo"><label>Niño</label><select onchange="cambiarCorreccion(this.value,null)">${ns.map(n=>`<option value="${n.id}" ${n.id===nid?'selected':''}>${esc(n.nombre)}</option>`).join('')}</select></div><div class="campo"><label>Fecha (hora central)</label><input type="date" min="${min}" max="${hoy()}" value="${fecha}" onchange="cambiarCorreccion(null,this.value)"></div></div><br><div class="lista">${ts.map(a=>{const s=estadoTarea(nid,fecha,a.id).estado;return`<div class="tarea ${['completa','aprobada'].includes(s)?'hecha':''}"><div class="tarea-icono">${a.resp.icono}</div><div class="tarea-main"><strong>${esc(a.resp.nombre)}</strong><div class="meta">${CATS[a.resp.categoria]?.nombre} • Estado actual: ${s}</div></div><select style="width:auto" onchange="corregirActividad('${nid}','${fecha}','${a.id}',this.value)">${[['incompleta','Incompleta'],['completa','Completa'],['pendiente','Pendiente'],['aprobada','Aprobada'],['justificada','Justificada'],['no_aplica','No aplica']].map(([v,l])=>`<option value="${v}" ${s===v?'selected':''}>${l}</option>`).join('')}</select></div>`}).join('')||'<p class="suave">No hay responsabilidades programadas para este niño en la fecha seleccionada.</p>'}</div></section>`}
window.cambiarCorreccion=(nid,fecha)=>{if(nid)sesion.correccionNino=nid;if(fecha)sesion.correccionFecha=fecha;renderizar()}
window.corregirActividad=(nid,fecha,aid,nuevo)=>{const k=claveRegistro(nid,fecha,aid),anterior=estadoTarea(nid,fecha,aid).estado;if(anterior===nuevo)return;estado.registros[k]={estado:nuevo,actualizado:new Date().toISOString(),modificadoPor:'padre'};estado.anulaciones.push({id:id(),clave:k,ninoId:nid,asignacionId:aid,fechaActividad:fecha,anterior,nuevo,fecha:new Date().toISOString()});guardar();aviso('Corrección guardada');renderizar()}
function pendientes(){return Object.entries(estado.registros).filter(([,v])=>v.estado==='pendiente').map(([k,v])=>{const [ninoId,fecha,asignacionId]=k.split('|');return{clave:k,ninoId,fecha,asignacionId,...v}})}
function aprobacionesPadre(){const ps=pendientes(),rs=estado.canjes.filter(c=>c.estado==='pendiente');document.getElementById('app').innerHTML=`${navPadre()}<section class="tarjeta"><h2>Cola de aprobación</h2><div class="lista">${ps.map(p=>{const n=estado.ninos.find(x=>x.id===p.ninoId),a=estado.asignaciones.find(x=>x.id===p.asignacionId),r=estado.responsabilidades.find(x=>x.id===a?.responsabilidadId);return`<div class="tarea pendiente"><div class="tarea-icono">${r?.icono||'✅'}</div><div class="tarea-main"><strong>${esc(n?.nombre||'')} — ${esc(r?.nombre||'')}</strong><div class="meta">${p.fecha}</div></div><button class="boton bien" onclick="anular('${p.clave}','aprobada')">Aprobar</button><button class="boton peligro" onclick="anular('${p.clave}','incompleta')">Necesita mejorar</button></div>`}).join('')||'<p>No hay tareas esperando aprobación.</p>'}</div><hr><h2>Solicitudes de recompensas</h2>${rs.map(c=>{const n=estado.ninos.find(x=>x.id===c.ninoId),r=estado.recompensas.find(x=>x.id===c.recompensaId);return`<div class="tarea"><div class="tarea-icono">${r.icono}</div><div class="tarea-main"><strong>${esc(n.nombre)} — ${esc(r.nombre)}</strong></div><button class="boton bien" onclick="aprobarCanje('${c.id}')">Aprobar</button></div>`}).join('')||'<p>No hay solicitudes.</p>'}</section>`}
window.anular=(k,nuevo)=>{const [ninoId,fechaActividad,asignacionId]=k.split('|'),anterior=estado.registros[k]?.estado||'incompleta';estado.registros[k]={estado:nuevo,actualizado:new Date().toISOString(),modificadoPor:'padre'};estado.anulaciones.push({id:id(),clave:k,ninoId,asignacionId,fechaActividad,anterior,nuevo,fecha:new Date().toISOString()});guardar();renderizar()}
window.aprobarCanje=cid=>{estado.canjes.find(c=>c.id===cid).estado='aprobada';guardar();aviso('Recompensa aprobada');renderizar()}
function historialPadre(){const ns=estado.ninos.filter(n=>n.activo),filtro=sesion.historialNino||'todos',cambios=(estado.anulaciones||[]).filter(a=>filtro==='todos'||a.ninoId===filtro).slice().reverse();document.getElementById('app').innerHTML=`${navPadre()}<section class="tarjeta"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><h2>Informes e historial de 1 año</h2><p class="suave">Los registros usan la zona horaria central de EE. UU. y se conservan durante 365 días.</p></div><button class="boton primario no-print" onclick="window.print()">Imprimir / Guardar PDF</button></div><div class="campo no-print" style="max-width:320px"><label>Filtrar cambios por niño</label><select onchange="sesion.historialNino=this.value;renderizar()"><option value="todos">Todos</option>${ns.map(n=>`<option value="${n.id}" ${filtro===n.id?'selected':''}>${esc(n.nombre)}</option>`).join('')}</select></div><br>${ns.map(n=>`<div class="tarjeta"><h3>${n.avatar} ${esc(n.nombre)}</h3><div class="rejilla cols3"><div class="metrica"><span>Progreso semanal</span><strong>${porcentajeSemanal(n.id)}%</strong></div><div class="metrica"><span>Premio semanal</span><strong>${premio(porcentajeSemanal(n.id)).icono}</strong>${premio(porcentajeSemanal(n.id)).nombre}</div><div class="metrica"><span>Puntos disponibles</span><strong>${puntos(n.id)}</strong></div></div></div>`).join('')}<h3>Registro de cambios de padres</h3><div class="tabla"><table><thead><tr><th>Cambio (hora central)</th><th>Niño</th><th>Fecha de actividad</th><th>Responsabilidad</th><th>Anterior</th><th>Nuevo</th></tr></thead><tbody>${cambios.map(a=>{const partes=(a.clave||'').split('|'),nid=a.ninoId||partes[0],aid=a.asignacionId||partes[2],n=estado.ninos.find(x=>x.id===nid),as=estado.asignaciones.find(x=>x.id===aid),r=estado.responsabilidades.find(x=>x.id===as?.responsabilidadId);return`<tr><td>${fechaHoraCentral(a.fecha)}</td><td>${esc(n?.nombre||'—')}</td><td>${a.fechaActividad||partes[1]||'—'}</td><td>${r?.icono||''} ${esc(r?.nombre||'—')}</td><td>${a.anterior}</td><td>${a.nuevo}</td></tr>`}).join('')||'<tr><td colspan="6">No hay cambios registrados.</td></tr>'}</tbody></table></div></section>`}
function premiosPadre(){
  const ordenados=[...estado.premios].sort((a,b)=>b.min-a.min);
  document.getElementById('app').innerHTML=`${navPadre()}<section class="tarjeta"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><h2>Administración de premios</h2><p class="suave">Define los niveles de premios según el porcentaje mínimo alcanzado. El sistema usa el nivel más alto que corresponda.</p></div><button class="boton primario" onclick="nuevoPremio()">Agregar premio</button></div><div class="rejilla cols3" style="margin-top:16px">${ordenados.map(p=>`<article class="premio" style="align-items:flex-start"><div class="premio-icono">${esc(p.icono)}</div><div style="flex:1"><strong>${esc(p.nombre)}</strong><div class="meta">Desde ${p.min}%</div><p>${esc(p.mensaje)}</p><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="boton neutro peq" onclick="editarPremio('${p.id}')">Editar</button><button class="boton peligro peq" onclick="eliminarPremio('${p.id}')">Eliminar</button></div></div></article>`).join('')}</div></section>`;
}
window.nuevoPremio=()=>modal('Agregar premio',`<div class="form-grid"><div class="campo"><label>Nombre del premio</label><input id="prNombre" placeholder="Ej. Súper Ayudante"></div><div class="campo"><label>Icono o emoji</label><input id="prIcono" value="🏆"></div><div class="campo"><label>Porcentaje mínimo</label><input id="prMin" type="number" min="0" max="100" value="80"></div><div class="campo"><label>Mensaje de motivación</label><input id="prMensaje" placeholder="¡Excelente trabajo!"></div></div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarPremio()">Guardar</button>`);
window.guardarPremio=()=>{
  const nombre=prNombre.value.trim(),icono=prIcono.value.trim()||'🏆',min=Math.max(0,Math.min(100,+prMin.value)),mensaje=prMensaje.value.trim();
  if(!nombre)return aviso('Escribe un nombre para el premio.');
  if(estado.premios.some(p=>p.min===min))return aviso('Ya existe un premio con ese porcentaje mínimo.');
  estado.premios.push({id:id(),nombre,icono,min,mensaje:mensaje||'¡Sigue avanzando!'});guardar();cerrarModal();aviso('Premio agregado');renderizar();
};
window.editarPremio=pid=>{const p=estado.premios.find(x=>x.id===pid);modal('Editar premio',`<div class="form-grid"><div class="campo"><label>Nombre del premio</label><input id="epNombre" value="${esc(p.nombre)}"></div><div class="campo"><label>Icono o emoji</label><input id="epIcono" value="${esc(p.icono)}"></div><div class="campo"><label>Porcentaje mínimo</label><input id="epMin" type="number" min="0" max="100" value="${p.min}"></div><div class="campo"><label>Mensaje de motivación</label><input id="epMensaje" value="${esc(p.mensaje)}"></div></div>`,`<button class="boton neutro" onclick="cerrarModal()">Cancelar</button><button class="boton primario" onclick="guardarEdicionPremio('${pid}')">Guardar cambios</button>`)};
window.guardarEdicionPremio=pid=>{
  const p=estado.premios.find(x=>x.id===pid),nombre=epNombre.value.trim(),min=Math.max(0,Math.min(100,+epMin.value));
  if(!nombre)return aviso('Escribe un nombre para el premio.');
  if(estado.premios.some(x=>x.id!==pid&&x.min===min))return aviso('Ya existe otro premio con ese porcentaje mínimo.');
  p.nombre=nombre;p.icono=epIcono.value.trim()||'🏆';p.min=min;p.mensaje=epMensaje.value.trim()||'¡Sigue avanzando!';guardar();cerrarModal();aviso('Premio actualizado');renderizar();
};
window.eliminarPremio=pid=>{
  if(estado.premios.length<=1)return aviso('Debe existir al menos un premio.');
  const p=estado.premios.find(x=>x.id===pid);
  if(!confirm(`¿Eliminar el premio "${p.nombre}"?`))return;
  estado.premios=estado.premios.filter(x=>x.id!==pid);guardar();aviso('Premio eliminado');renderizar();
};
function ajustesPadre(){document.getElementById('app').innerHTML=`${navPadre()}<section class="rejilla cols2"><div class="tarjeta"><h2>Ajustes familiares</h2><div class="campo"><label>Nombre de la familia</label><input id="sFam" value="${esc(estado.ajustes.nombreFamilia)}"></div><br><div class="campo"><label>La semana comienza el</label><select id="sSemana"><option value="domingo" ${estado.ajustes.iniciaSemana==='domingo'?'selected':''}>Domingo</option><option value="lunes" ${estado.ajustes.iniciaSemana==='lunes'?'selected':''}>Lunes</option></select></div><br><label><input id="sAnim" type="checkbox" ${estado.ajustes.animaciones?'checked':''} style="width:auto"> Activar celebraciones</label><br><br><div class="campo"><label>Meta familiar (%)</label><input id="sMeta" type="number" value="${estado.metaFamiliar.objetivo}"></div><br><div class="campo"><label>Recompensa familiar</label><input id="sRec" value="${esc(estado.metaFamiliar.recompensa)}"></div><br><button class="boton primario" onclick="guardarAjustes()">Guardar ajustes</button></div><div class="tarjeta"><h2>Respaldo de datos</h2><p class="suave">Los datos se guardan solamente en este navegador. Exporta un respaldo antes de cambiar de dispositivo.</p><button class="boton bien" onclick="exportar()">Exportar respaldo JSON</button><br><br><label class="boton neutro">Importar respaldo<input type="file" accept=".json" onchange="importar(event)" hidden></label><br><br><button class="boton peligro" onclick="reiniciar()">Borrar todos los datos</button></div></section>`}
window.guardarAjustes=()=>{estado.ajustes.nombreFamilia=sFam.value.trim();estado.ajustes.iniciaSemana=sSemana.value;estado.ajustes.animaciones=sAnim.checked;estado.metaFamiliar.objetivo=+sMeta.value;estado.metaFamiliar.recompensa=sRec.value;guardar();aviso('Ajustes guardados');renderizar()}
window.exportar=()=>{const b=new Blob([JSON.stringify(estado,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`respaldo-aventura-familiar-${hoy()}.json`;a.click();URL.revokeObjectURL(a.href)}
window.importar=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!x.version||!Array.isArray(x.ninos))throw 0;if(confirm('¿Reemplazar los datos actuales con este respaldo?')){estado=x;guardar();aviso('Respaldo importado');renderizar()}}catch{aviso('El archivo de respaldo no es válido')}};r.readAsText(f)}
window.reiniciar=()=>{if(confirm('Esto borrará permanentemente todos los datos familiares guardados en este navegador. ¿Continuar?')){localStorage.removeItem(CLAVE);estado=base();cambiarSesion(null)}}
renderizar();
})();
</script>
</body>
