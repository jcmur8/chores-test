<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Misión Familiar</title>
  <style>
    :root{
      --bg:#f6f7fb;--card:#fff;--ink:#172033;--muted:#667085;--primary:#4f46e5;
      --primary2:#7c3aed;--success:#16a34a;--warn:#f59e0b;--danger:#dc2626;
      --line:#e5e7eb;--shadow:0 12px 28px rgba(23,32,51,.09);--radius:20px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#eef2ff 0,#f8fafc 30%,#f6f7fb 100%);color:var(--ink);min-height:100vh}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{max-width:1200px;margin:auto;padding:18px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:1.2rem}
    .brand-badge{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:var(--shadow)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:0;border-radius:14px;padding:11px 15px;font-weight:800;background:#eef2ff;color:#3730a3;min-height:44px}
    .btn:hover{filter:brightness(.98)}
    .btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white}
    .btn.success{background:#dcfce7;color:#166534}
    .btn.warn{background:#fef3c7;color:#92400e}
    .btn.danger{background:#fee2e2;color:#991b1b}
    .btn.ghost{background:white;border:1px solid var(--line);color:var(--ink)}
    .btn.small{padding:8px 10px;min-height:36px;border-radius:10px;font-size:.9rem}
    .card{background:var(--card);border:1px solid rgba(229,231,235,.9);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
    .grid{display:grid;gap:16px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .hero{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:stretch}
    .hero-main{padding:28px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:28px;box-shadow:var(--shadow)}
    .hero-main h1{font-size:clamp(2rem,5vw,4rem);margin:0 0 10px;line-height:1}
    .hero-main p{font-size:1.1rem;opacity:.92;max-width:700px}
    .hero-side{display:grid;gap:16px}
    h1,h2,h3{margin-top:0}
    .muted{color:var(--muted)}
    .hidden{display:none!important}
    .avatar{width:68px;height:68px;border-radius:20px;display:grid;place-items:center;font-size:2rem;background:#eef2ff}
    .child-picker{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
    .child-card{border:2px solid transparent;text-align:center;background:white;border-radius:20px;padding:18px;box-shadow:var(--shadow);transition:.18s}
    .child-card:hover{transform:translateY(-2px);border-color:#c7d2fe}
    .child-card .avatar{margin:0 auto 10px}
    .metric{padding:16px;border-radius:16px;background:#f8fafc;border:1px solid var(--line)}
    .metric strong{font-size:1.7rem;display:block}
    .progress{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}
    .progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#8b5cf6);border-radius:inherit;transition:width .3s}
    .ring{--p:0;width:150px;height:150px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--primary) calc(var(--p)*1%),#e5e7eb 0);position:relative}
    .ring:before{content:"";position:absolute;inset:14px;background:white;border-radius:50%}
    .ring strong{position:relative;font-size:2rem}
    .task-list{display:grid;gap:10px}
    .task{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);border-radius:16px;background:white}
    .task.done{background:#f0fdf4;border-color:#bbf7d0}
    .task.pending{background:#fffbeb;border-color:#fde68a}
    .task-icon{font-size:1.8rem;width:44px;text-align:center}
    .task-main{flex:1;min-width:0}
    .task-main strong{display:block}
    .task-meta{font-size:.85rem;color:var(--muted)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-weight:800;font-size:.85rem}
    .award{display:flex;gap:12px;align-items:center;padding:16px;border-radius:18px;background:linear-gradient(135deg,#fff7ed,#fffbeb);border:1px solid #fed7aa}
    .award-icon{font-size:2.5rem}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .nav button.active{background:var(--primary);color:white}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    label{font-weight:700;font-size:.9rem}
    input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:12px;padding:11px 12px;background:white}
    textarea{min-height:90px;resize:vertical}
    .field{display:grid;gap:6px}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.62);display:grid;place-items:center;padding:16px;z-index:30}
    .modal{background:white;border-radius:24px;padding:20px;width:min(620px,100%);max-height:90vh;overflow:auto;box-shadow:0 28px 70px rgba(0,0,0,.25)}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap}
    .table-wrap{overflow:auto}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:11px;border-bottom:1px solid var(--line);vertical-align:top}
    th{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .day-cell{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center;min-height:85px}
    .garden{min-height:170px;border-radius:20px;background:linear-gradient(#dbeafe 0 55%,#dcfce7 55%);padding:18px;display:flex;align-items:end;gap:8px;overflow:hidden}
    .plant{font-size:2rem;animation:pop .25s ease}
    .path{display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:18px;padding:16px;position:relative}
    .path:before{content:"";position:absolute;left:7%;right:7%;top:50%;height:6px;background:#dbeafe;border-radius:99px;z-index:0}
    .path-stop{position:relative;z-index:1;background:white;border:3px solid #c7d2fe;border-radius:50%;width:56px;height:56px;display:grid;place-items:center;font-size:1.6rem}
    .path-stop.active{border-color:var(--primary);transform:scale(1.08)}
    .toast{position:fixed;right:20px;bottom:20px;background:#111827;color:white;padding:13px 16px;border-radius:14px;box-shadow:var(--shadow);z-index:60}
    .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:55}
    .confetti span{position:absolute;top:-20px;font-size:1.3rem;animation:fall 1.6s linear forwards}
    @keyframes fall{to{transform:translateY(110vh) rotate(600deg)}}
    @keyframes pop{from{transform:scale(.6);opacity:0}}
    @media(max-width:850px){.hero,.grid.cols-4,.grid.cols-3,.grid.cols-2,.form-grid{grid-template-columns:1fr}.week-grid{grid-template-columns:repeat(4,1fr)}}
    @media(max-width:520px){.app{padding:10px}.topbar{align-items:flex-start}.toolbar{justify-content:flex-end}.week-grid{grid-template-columns:repeat(2,1fr)}.hero-main{padding:22px}.task{align-items:flex-start}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
    @media print{body{background:white}.topbar,.nav,.no-print{display:none!important}.card{box-shadow:none;break-inside:avoid}}
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><div class="brand-badge">🏡</div><div>Misión Familiar<br><small style="font-weight:600;color:#667085">Responsabilidades, buenos hábitos y progreso en familia</small></div></div>
    <div class="toolbar" id="globalToolbar"></div>
  </header>
  <main id="app"></main>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<script>
(() => {
  'use strict';
  const STORAGE_KEY='familyQuest.v1';
  const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const CATS={
    household:{label:'Tareas del Hogar',icon:'🏠'},
    personal:{label:'Responsabilidades Personales',icon:'🧼'},
    practice:{label:'Buenos Hábitos',icon:'🌱'}
  };
  const DEFAULT_AWARDS=[
    {min:100,name:'Campeón Diamante',icon:'💎',message:'¡Esfuerzo perfecto hoy!'},
    {min:90,name:'Estrella de Oro',icon:'🌟',message:'¡Trabajo increíble!'},
    {min:80,name:'Estrella de Plata',icon:'⭐',message:'¡Firme y constante!'},
    {min:70,name:'Estrella de Bronce',icon:'🥉',message:'¡Excelente progreso!'},
    {min:50,name:'Ayudante en Progreso',icon:'🌱',message:'¡Estás creciendo!'},
    {min:0,name:'Sigue Creciendo',icon:'💪',message:'¡Cada paso cuenta!'}
  ];
  const LIBRARY=[
    ['Recoger la sala','household','🛋️',1,'fácil'],
    ['Guardar los juguetes','household','🧸',1,'fácil'],
    ['Barrer el piso','household','🧹',2,'media'],
    ['Levantar la mesa','household','🍽️',1,'fácil'],
    ['Limpiar la mesa','household','🧽',2,'media'],
    ['Poner los platos en el lavavajillas','household','🍽️',2,'media'],
    ['Vaciar el lavavajillas','household','🫧',2,'media'],
    ['Sacar la basura','household','🗑️',3,'difícil'],
    ['Guardar los zapatos','household','👟',1,'fácil'],
    ['Doblar las toallas','household','🧺',2,'media'],
    ['Cepillarse los dientes - mañana','personal','🪥',1,'fácil'],
    ['Cepillarse los dientes - noche','personal','🪥',1,'fácil'],
    ['Bañarse o ducharse','personal','🚿',2,'media'],
    ['Preparar la ropa para mañana','personal','👕',1,'fácil'],
    ['Tender la cama','personal','🛏️',1,'fácil'],
    ['Preparar la mochila escolar','personal','🎒',1,'fácil'],
    ['Hacer ejercicio o jugar activamente','practice','🏃',2,'media'],
    ['Leer durante 20 minutos','practice','📚',2,'media'],
    ['Oración diaria','practice','🙏',1,'fácil'],
    ['Leer las Escrituras','practice','📖',1,'fácil'],
    ['Compartir algo por lo que estás agradecido','practice','💛',1,'fácil'],
    ['Ayudar a un familiar','practice','🤝',2,'media']
  ];
  let state=load();
  let session={role:null,childId:null,parentDesbloquearedAt:null,view:'home'};
  let inactivityHorar=null;

  function uid(){return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)}
  function today(){return new Date().toISOString().slice(0,10)}
  function weekStart(date=new Date()){
    const d=new Date(date); const start=state.settings.weekStartsOn==='monday'?1:0;
    const diff=(d.getDay()-start+7)%7; d.setDate(d.getDate()-diff); d.setHours(0,0,0,0); return d.toISOString().slice(0,10);
  }
  function dateAgregar(iso,n){const d=new Date(iso+'T12:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
  function escapeHtml(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
  async function hash(text){const bytes=new TextEncoder().encode(text);const buf=await crypto.subtle.digest('SHA-256',bytes);return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}
  function defaults(){
    return {
      schemaVersion:1,
      settings:{familyNombre:'Nuestra Familia',weekStartsOn:'sunday',animations:true,showPuntos:true,showStreaks:true,theme:'classic',parentHash:'',createdAt:new Date().toISOString()},
      children:[],
      responsibilities:LIBRARY.map(([name,category,icon,weight,difficulty])=>({id:uid(),name,category,icon,weight,difficulty,instructions:'',active:true,verification:false,character:characterFor(category)})),
      assignments:[],
      completions:{},
      awards:DEFAULT_AWARDS,
      overrides:[],
      archives:[],
      rewards:[
        {id:uid(),name:'Elegir la película familiar',cost:40,icon:'🎬'},
        {id:uid(),name:'Elegir el postre',cost:30,icon:'🍨'},
        {id:uid(),name:'Acostarse 15 minutos más tarde',cost:50,icon:'🌙'}
      ],
      redemptions:[],
      familyGoal:{target:90,reward:'Noche de película familiar'},
      demo:false
    };
  }
  function characterFor(cat){return cat==='household'?'Trabajo en equipo':cat==='personal'?'Responsabilidad':'Crecimiento'}
  function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||defaults()}catch{return defaults()}}
  function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
  function setSession(role,childId=null){session={role,childId,parentDesbloquearedAt:role==='parent'?Date.now():null,view:role==='parent'?'parent-dashboard':role==='child'?'child-today':'home'}; render(); resetInactivity()}
  function resetInactivity(){clearHoraout(inactivityHorar);if(session.role==='parent'){inactivityHorar=setHoraout(()=>{toast('El modo de padres ha sido bloqueado');setSession(null)},10*60*1000)}}
  ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>session.role==='parent'&&resetInactivity(),{passive:true}));

  function statusLabel(s){
    return ({incomplete:'Pendiente',complete:'Completada',pending:'Esperando aprobación',
      approved:'Aprobada',excused:'Exenta',na:'No aplica'})[s]||s;
  }

  function compKey(childId,date,assignmentId){return `${childId}|${date}|${assignmentId}`}
  function getStatus(childId,date,assignmentId){return state.completions[compKey(childId,date,assignmentId)]||{status:'incomplete'}}
  function setStatus(childId,date,assignmentId,status,note=''){
    const key=compKey(childId,date,assignmentId);
    state.completions[key]={status,updatedAt:new Date().toISOString(),note}; save();
  }
  function activeAssignments(childId,date){
    const dow=new Date(date+'T12:00:00').getDay();
    return state.assignments.filter(a=>a.childId===childId&&a.active!==false&&a.weekStart===weekStart(new Date(date+'T12:00:00'))&&(a.days||[]).includes(dow))
      .map(a=>({...a,resp:state.responsibilities.find(r=>r.id===a.responsibilityId)})).filter(x=>x.resp&&x.resp.active!==false);
  }
  function percent(childId,date){
    const list=activeAssignments(childId,date);
    let den=0,num=0;
    list.forEach(a=>{const s=getStatus(childId,date,a.id).status;const w=a.weight||a.resp.weight||1;if(['excused','na'].includes(s))return;den+=w;if(['complete','approved'].includes(s))num+=w});
    return den?Math.round(num/den*100):0;
  }
  function weeklyPercent(childId,ws=weekStart()){
    let den=0,num=0;
    for(let i=0;i<7;i++){const d=dateAgregar(ws,i);const list=activeAssignments(childId,d);list.forEach(a=>{const s=getStatus(childId,d,a.id).status;const w=a.weight||a.resp.weight||1;if(['excused','na'].includes(s))return;den+=w;if(['complete','approved'].includes(s))num+=w})}
    return den?Math.round(num/den*100):0;
  }
  function awardFor(p){return [...state.awards].sort((a,b)=>b.min-a.min).find(a=>p>=a.min)||state.awards[state.awards.length-1]}
  function childPuntos(childId){
    let pts=0;Object.entries(state.completions).forEach(([k,v])=>{if(k.startsWith(childId+'|')&&['complete','approved'].includes(v.status)){const aid=k.split('|')[2];const a=state.assignments.find(x=>x.id===aid);pts+=a?.weight||1}});return pts-state.redemptions.filter(r=>r.childId===childId).reduce((s,r)=>s+r.cost,0)
  }
  function toast(msg){const el=document.createElement('div');el.classNombre='toast';el.textContent=msg;document.getElementById('toastRoot').appendHijo(el);setHoraout(()=>el.remove(),2400)}
  function celebrate(){if(!state.settings.animations)return;const c=document.createElement('div');c.classNombre='confetti';for(let i=0;i<30;i++){const s=document.createElement('span');s.textContent=['⭐','🎉','✨','💎'][i%4];s.style.left=Math.random()*100+'%';s.style.animationDelay=Math.random()*.5+'s';c.appendHijo(s)}document.body.appendHijo(c);setHoraout(()=>c.remove(),2200)}
  function modal(title,body,actions=''){document.getElementById('modalRoot').innerHTML=`<div class="modal-backdrop" onclick="if(event.target===this)closeModal()"><div class="modal"><h2>${title}</h2>${body}<div class="modal-actions">${actions||'<button class="btn ghost" onclick="closeModal()">Close</button>'}</div></div></div>`}
  window.closeModal=()=>document.getElementById('modalRoot').innerHTML='';

  function render(){
    const root=document.getElementById('app');
    document.getElementById('globalToolbar').innerHTML=session.role?`<span class="badge">${session.role==='parent'?'🔐 Padres':'👤 Hijo'} Modo</span><button class="btn ghost small" onclick="logout()">Bloquear / Salir</button>`:'';
    if(!state.settings.parentHash){renderSetup();return}
    if(!session.role){renderHome();return}
    if(session.role==='child')renderHijo();
    else renderPadres();
  }

  function renderSetup(){
    document.getElementById('app').innerHTML=`
      <section class="hero">
        <div class="hero-main"><h1>Creen hábitos. Crezcan juntos.</h1><p>Configura el registro privado de tareas y responsabilidades de tu familia. Los datos permanecen en este navegador.</p></div>
        <div class="card">
          <h2>Configuración para Padres</h2>
          <div class="field"><label>Nombre de la familia</label><input id="setupFamily" value="Nuestra Familia"></div><br>
          <div class="field"><label>Contraseña maestra o PIN</label><input id="setupPass" type="password" minlength="4"></div><br>
          <div class="field"><label>Confirmar contraseña maestra</label><input id="setupPass2" type="password"></div><br>
          <button class="btn primary" onclick="completeSetup()">Crear Aplicación Familiar</button>
          <button class="btn ghost" onclick="loadDemo()">Cargar Familia de Demostración</button>
        </div>
      </section>`;
  }

  async function completeSetup(){
    const p=document.getElementById('setupPass').value,p2=document.getElementById('setupPass2').value;
    if(p.length<4||p!==p2)return toast('Las contraseñas deben coincidir y tener al menos 4 caracteres.');
    state.settings.familyNombre=document.getElementById('setupFamily').value.trim()||'Nuestra Familia';
    state.settings.parentHash=await hash(p);save();toast('Aplicación familiar creada');showAgregarHijo(true);render();
  }
  window.completeSetup=completeSetup;

  async function loadDemo(){
    state=defaults();state.settings.familyNombre='La Familia Aventurera';state.settings.parentHash=await hash('2468');state.demo=true;
    const kids=[['Avery',10,'🧑‍🚀','111'],['Jordan',8,'⚽','222'],['Riley',6,'🦄','333'],['Casey',5,'🦖','444'],['Taylor',4,'🐻','555']];
    for(const [name,age,avatar,pin] of kids)state.children.push({id:uid(),name,age,avatar,pinHash:await hash(pin),active:true,youngModo:age<=5});
    createStarterAssignments();save();toast('Demostración cargada. Contraseña de padres: 2468');render();
  }
  window.loadDemo=loadDemo;

  function renderHome(){
    const dailyFamily=state.children.filter(c=>c.active).map(c=>percent(c.id,today()));
    const fam=dailyFamily.length?Math.round(dailyFamily.reduce((a,b)=>a+b,0)/dailyFamily.length):0;
    const quote=['Los pequeños pasos forman hábitos fuertes.','Ayudar en casa fortalece a toda la familia.','La responsabilidad es un superpoder.'][new Date().getDate()%3];
    document.getElementById('app').innerHTML=`
      <section class="hero">
        <div class="hero-main"><h1>${escapeHtml(state.settings.familyNombre)} Centro Familiar</h1><p>${quote}</p>
          <div class="grid cols-3" style="margin-top:24px">
            <div class="metric"><span>Hoy</span><strong>${new Date().toLocaleDateString('es-US',{weekday:'long',month:'short',day:'numeric'})}</strong></div>
            <div class="metric"><span>Progreso familiar</span><strong>${fam}%</strong><div class="progress"><span style="width:${fam}%"></span></div></div>
            <div class="metric"><span>Meta familiar</span><strong>${state.familyGoal.target}%</strong><small>${escapeHtml(state.familyGoal.reward)}</small></div>
          </div>
        </div>
        <div class="hero-side">
          <button class="card" style="text-align:left" onclick="parentLogin()"><h2>🔐 Acceso de Padres</h2><p class="muted">Administra asignaciones, aprobaciones, reportes y configuración.</p></button>
          <div class="card"><h3>Reto Semanal</h3><p>¡Completa tus responsabilidades y haz crecer el jardín familiar!</p></div>
        </div>
      </section>
      <section class="card" style="margin-top:16px"><h2>Elige tu perfil</h2>
        <div class="child-picker">${state.children.filter(c=>c.active).map(c=>`<button class="child-card" onclick="childLogin('${c.id}')"><div class="avatar">${c.avatar}</div><strong>${escapeHtml(c.name)}</strong><div class="muted">${weeklyPercent(c.id)}% esta semana</div></button>`).join('')||'<p>Todavía no hay niños agregados. Usa el acceso de padres para agregarlos.</p>'}</div>
      </section>`;
  }

  function parentLogin(){
    modal('Acceso de Padres',`<div class="field"><label>Contraseña maestra</label><input id="parentPass" type="password" autofocus onkeydown="if(event.key==='Enter')verifyPadres()"></div>`,
      `<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="verifyPadres()">Desbloquear</button>`);
  }
  window.parentLogin=parentLogin;
  async function verifyPadres(){const ok=await hash(document.getElementById('parentPass').value)===state.settings.parentHash;if(!ok)return toast('Contraseña incorrecta');closeModal();setSession('parent')}
  window.verifyPadres=verifyPadres;

  function childLogin(id){
    const c=state.children.find(x=>x.id===id);

  }
  function taskHtml(c,a){
    const s=getStatus(c.id,today(),a.id).status,done=['complete','approved'].includes(s),pending=s==='pending';

    return `<div class="task ${done?'done':''} ${pending?'pending':''}"><div class="task-icon">${a.resp.icon}</div><div class="task-main"><strong>${escapeHtml(a.resp.name)}</strong><div class="task-meta">${CATS[a.resp.category].label} • ${a.weight||a.resp.weight} punto(s) • ${a.resp.character}</div></div><button class="btn ${done?'success':pending?'warn':'primary'}" onclick="toggleTask('${a.id}')">${label}</button>${c.youngModo?`<button class="btn ghost small" onclick="speak('${escapeHtml(a.resp.name)}')">🔊</button>`:''}</div>`;

      [household[idx%household.length],household[(idx+5)%household.length]].forEach(r=>state.assignments.push({id:uid(),weekStart:ws,childId:c.id,responsibilityId:r.id,days:[1,3,5],weight:r.weight,active:true}));

  }

  function parentSettings(nav){
    document.getElementById('app').innerHTML=`${nav}<section class="grid cols-2"><div class="card"><h2>Configuración Familiar</h2><div class="field"><label>Nombre de la familia</label><input id="sFamily" value="${escapeHtml(state.settings.familyNombre)}"></div><br><div class="field"><label>La semana comienza el</label><select id="sWeek"><option value="sunday" ${state.settings.weekStartsOn==='sunday'?'selected':''}>Domingo</option><option value="monday" ${state.settings.weekStartsOn==='monday'?'selected':''}>Lunes</option></select></div><br><label><input id="sAnim" type="checkbox" ${state.settings.animations?'checked':''} style="width:auto"> Activar celebraciones</label><br><br><div class="field"><label>Porcentaje de la meta familiar</label><input id="sGoal" type="number" value="${state.familyGoal.target}"></div><br><div class="field"><label>Recompensa familiar</label><input id="sReward" value="${escapeHtml(state.familyGoal.reward)}"></div><br><button class="btn primary" onclick="saveSettings()">Guardar Configuración</button></div><div class="card"><h2>Respaldo de Datos</h2><p class="muted">Los registros se guardan únicamente en este navegador. Exporta un respaldo antes de cambiar de dispositivo.</p><button class="btn success" onclick="exportData()">Exportar Respaldo JSON</button><br><br><label class="btn ghost">Importar Respaldo<input type="file" accept=".json" onchange="importData(event)" hidden></label><br><br><button class="btn danger" onclick="resetData()">Restablecer Datos de la Aplicación</button></div></section>`;
  }
  window.saveSettings=()=>{state.settings.familyNombre=document.getElementById('sFamily').value.trim();state.settings.weekStartsOn=document.getElementById('sWeek').value;state.settings.animations=document.getElementById('sAnim').checked;state.familyGoal.target=+document.getElementById('sGoal').value;state.familyGoal.reward=document.getElementById('sReward').value;save();toast('Configuración guardada');render()}
  window.exportData=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`family-quest-backup-${today()}.json`;a.click();URL.revokeObjectURL(a.href)}
  window.importData=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!x.schemaVersion||!Array.isArray(x.children))throw 0;if(confirm('¿Reemplazar los datos actuales con este respaldo?')){state=x;save();toast('Respaldo importado');render()}}catch{toast('Archivo de respaldo no válido')}};r.readAsText(f)}
  window.resetData=()=>{if(confirm('Esto eliminará permanentemente todos los datos familiares locales. ¿Deseas continuar?')){localStorage.removeItem(STORAGE_KEY);state=defaults();setSession(null)}}

  render();
})();
</script>
</body>
</html>
